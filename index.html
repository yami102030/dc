<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBC同工資料中心</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react,react-dom",
            "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
    }
    </script>
    <style>
        body { 
            background-color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊高光 */
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        
        /* 隱藏橫向滾動條但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 自定義垂直滾動條 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 強制輸入框字體不小於16px以防止iOS自動放大 */
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Users, UserPlus, Search, Edit2, Trash2, Save, X, AlertCircle, 
            CheckCircle2, Clock, CalendarX, ShieldCheck, ChevronRight,
            Pin, Ban, Heart, Copy, LogOut, Lock, User, Info, MoreHorizontal, Check
        } from 'lucide-react';
        import { createClient } from '@supabase/supabase-js';

        // --- Supabase 連線設定 ---
        const SUPABASE_URL = "https://jcepavwocdujoeoqxvsd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Tj2n8e3yY1HyvaFzXRyO_w_PWrVFB7E"; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ★★★ 管理員設定 ★★★
        const ADMIN_ACCOUNT = "tbcadmin"; 

        // --- 虛擬 Email 轉換工具 ---
        const VIRTUAL_DOMAIN = "@tbc.gmail.com";
        const formatEmailForAuth = (acc) => {
            if (!acc) return '';
            const trimmed = acc.trim();
            return trimmed.includes('@') ? trimmed : `${trimmed}${VIRTUAL_DOMAIN}`;
        };
        const extractAccountFromEmail = (email) => {
            if (!email) return '';
            return email.endsWith(VIRTUAL_DOMAIN) ? email.replace(VIRTUAL_DOMAIN, '') : email;
        };

        // --- 預設資料結構 ---
        const DEFAULT_MEMBER = {
            name: '',
            email: '', 
            preferred_session: '第一堂',
            availability_status: '穩定服事',
            dual_service_pref: 0,
            group_id: '',
            unavailable_dates: [], 
            newcomer_rule: '' 
        };

        const SESSION_OPTIONS = ['第一堂', '第二堂', '皆可'];
        const STATUS_OPTIONS = ['穩定服事', '暫停服事', '安息季', '一季一次'];

        // --- 自動產生基礎季度清單 ---
        const generateBaseQuarters = () => {
            const d = new Date();
            const currentYear = d.getFullYear();
            const currentQ = Math.floor(d.getMonth() / 3) + 1;
            const quarters = [];
            for (let offset = 0; offset <= 2; offset++) {
                let q = currentQ + offset;
                let y = currentYear;
                if (q > 4) { q -= 4; y += 1; }
                quarters.push(`${y}-Q${q}`);
            }
            return quarters;
        };

        const getNextQuarter = (qStr) => {
            let [y, q] = qStr.split('-Q').map(Number);
            if (q === 4) return `${y + 1}-Q1`;
            return `${y}-Q${q + 1}`;
        };

        const getCurrentQuarter = () => {
            const d = new Date();
            return `${d.getFullYear()}-Q${Math.floor(d.getMonth() / 3) + 1}`;
        };

        // --- 取得某季度的所有主日 (週日) 日期 ---
        const getSundaysInQuarter = (quarterStr) => {
            if (!quarterStr) return [];
            const parts = quarterStr.split('-Q');
            if (parts.length !== 2) return [];
            const year = parseInt(parts[0], 10);
            const quarter = parseInt(parts[1], 10);
            if (isNaN(year) || isNaN(quarter)) return [];
            
            const startMonth = (quarter - 1) * 3;
            const startDate = new Date(year, startMonth, 1);
            const endDate = new Date(year, startMonth + 3, 0);
            const sundays = [];

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                if (d.getDay() === 0) { 
                    const yyyy = d.getFullYear();
                    const mm = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    sundays.push(`${yyyy}-${mm}-${dd}`);
                }
            }
            return sundays;
        };

        // --- 判斷特殊節日 ---
        const getHolidayName = (dateStr, customHolidaysMap = {}) => {
            if (customHolidaysMap && customHolidaysMap[dateStr]) {
                return customHolidaysMap[dateStr];
            }
            const [year, month, day] = dateStr.split('-');
            const md = `${month}-${day}`;
            
            const lunarAndLongWeekends = {
                '2026-02-15': '春節連假', '2026-02-22': '春節連假', '2026-03-01': '228連假', 
                '2026-04-05': '清明連假', '2026-06-21': '端午連假', '2026-09-27': '中秋連假', '2026-10-11': '國慶連假',
                '2027-02-07': '春節連假', '2027-02-14': '春節連假', '2027-02-28': '228連假', 
                '2027-04-04': '清明連假', '2027-06-13': '端午連假', '2027-09-19': '中秋連假', '2027-10-10': '國慶連假',
                '2028-01-30': '春節連假', '2028-02-27': '228連假', '2028-04-02': '清明連假', 
                '2028-05-28': '端午連假', '2028-10-08': '國慶連假',
                '2029-02-11': '春節連假', '2029-02-18': '春節連假', '2029-04-01': '清明連假', 
                '2029-06-17': '端午連假', '2029-09-23': '中秋連假',
                '2030-02-03': '春節連假', '2030-02-10': '春節連假', '2030-04-07': '清明連假',
                '2030-06-02': '端午連假', '2030-09-15': '中秋連假', '2030-10-13': '國慶連假'
            };

            if (lunarAndLongWeekends[dateStr]) return lunarAndLongWeekends[dateStr];

            const dayNum = parseInt(day, 10);
            if (month === '05' && dayNum >= 8 && dayNum <= 14) return '母親節';

            const fixedHolidays = {
                '01-01': '元旦', '02-28': '和平紀念日', '04-04': '兒童節', '04-05': '清明節',
                '05-01': '勞動節', '08-08': '父親節', '10-10': '國慶日', '12-25': '聖誕節'
            };
            
            if (fixedHolidays[md]) return fixedHolidays[md];
            return null; 
        };

        // ==========================================
        // 登入元件 AuthScreen
        // ==========================================
        const AuthScreen = ({ supabase }) => {
            const [account, setAccount] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState(''); 
            const [inviteCode, setInviteCode] = useState(''); 
            const [loading, setLoading] = useState(false);
            const [isSignUp, setIsSignUp] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            const SECRET_INVITE_CODE = "HAPPY";

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMsg('');
                
                const loginEmail = formatEmailForAuth(account);

                try {
                    if (isSignUp) {
                        if (password !== confirmPassword) throw new Error('兩次輸入的密碼不同');
                        if (inviteCode !== SECRET_INVITE_CODE) throw new Error('邀請碼錯誤');

                        const { error } = await supabase.auth.signUp({ email: loginEmail, password });
                        if (error) throw error;
                        alert('註冊成功！現在您可以直接登入系統了。');
                        setIsSignUp(false);
                        setInviteCode('');
                        setConfirmPassword('');
                    } else {
                        const { error } = await supabase.auth.signInWithPassword({ email: loginEmail, password });
                        if (error) throw error;
                    }
                } catch (error) {
                    let msg = error.message;
                    if (msg.includes('Invalid login credentials')) msg = '登入失敗：帳號或密碼錯誤。';
                    if (msg.includes('User already registered')) msg = '綁定失敗：Oops！帳號有人用了';
                    if (msg.includes('Password should be at least')) msg = '密碼長度至少6個字元';
                    if (msg.includes('邀請碼錯誤')) msg = error.message; 
                    if (msg.includes('兩次輸入的密碼不同')) msg = error.message; 
                    setErrorMsg(msg);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white max-w-md w-full rounded-[2rem] shadow-xl p-6 sm:p-8 border border-slate-100 animate-fade-in">
                        <div className="flex flex-col items-center mb-8">
                            <div className="bg-indigo-600 p-4 rounded-2xl text-white shadow-md mb-4">
                                <Users size={32} />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 text-center leading-tight">
                                TBC<br />同工資料中心
                            </h1>
                        </div>

                        {errorMsg && (
                            <div className="bg-red-50 text-red-600 text-sm font-bold p-3 rounded-xl mb-6 flex items-center gap-2 leading-relaxed">
                                <AlertCircle size={18} className="shrink-0" /> {errorMsg}
                            </div>
                        )}

                        <form onSubmit={handleAuth} className="space-y-4 sm:space-y-5">
                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">帳號</label>
                                <div className="relative">
                                    <User className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input 
                                        type="text" 
                                        value={account}
                                        onChange={(e) => setAccount(e.target.value)}
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-semibold text-slate-700"
                                        placeholder="電話號碼或電子郵件"
                                        required
                                    />
                                </div>
                            </div>
                            
                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">密碼</label>
                                <div className="relative">
                                    <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input 
                                        type="password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-semibold text-slate-700"
                                        placeholder="6位以上英數組合"
                                        required
                                    />
                                </div>
                            </div>

                            {isSignUp && (
                                <div className="space-y-1.5 animate-fade-in">
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">確認密碼 <span className="text-red-500">*</span></label>
                                    <div className="relative">
                                        <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input 
                                            type="password" 
                                            value={confirmPassword}
                                            onChange={(e) => setConfirmPassword(e.target.value)}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-semibold text-slate-700"
                                            placeholder="再次輸入密碼"
                                            required={isSignUp}
                                        />
                                    </div>
                                </div>
                            )}

                            {isSignUp && (
                                <div className="space-y-1.5 animate-fade-in">
                                    <label className="text-xs font-bold text-indigo-500 uppercase tracking-wider ml-1">邀請碼 <span className="text-red-500">*</span></label>
                                    <div className="relative">
                                        <ShieldCheck className="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400" size={18} />
                                        <input 
                                            type="text" 
                                            value={inviteCode}
                                            onChange={(e) => setInviteCode(e.target.value)}
                                            className="w-full bg-indigo-50/50 border border-indigo-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-semibold text-slate-700"
                                            placeholder="輸入本會提供的邀請碼"
                                            required={isSignUp}
                                        />
                                    </div>
                                </div>
                            )}

                            {isSignUp && (
                                <div className="bg-amber-50 text-amber-700 text-xs font-bold p-3 rounded-xl border border-amber-100 flex items-start gap-2 leading-relaxed mt-2">
                                    <AlertCircle size={16} className="shrink-0 mt-0.5" />
                                    請聯絡行政辦公室完成授權並索取邀請碼，再進行帳號綁定。
                                </div>
                            )}

                            <button 
                                type="submit" 
                                disabled={loading}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95 mt-4 text-lg"
                            >
                                {loading ? '處理中...' : (isSignUp ? '綁定帳號' : '登入')}
                            </button>
                        </form>

                        <div className="mt-6 flex flex-col gap-3 text-center">
                            <button 
                                type="button"
                                onClick={() => {
                                    setIsSignUp(!isSignUp);
                                    setErrorMsg(''); 
                                    setConfirmPassword(''); 
                                    setInviteCode(''); 
                                }}
                                className="text-sm font-bold text-indigo-500 hover:text-indigo-700 transition-colors py-2"
                            >
                                {isSignUp ? '已經有帳號？立即登入' : '沒有帳號嗎？建立一個吧！'}
                            </button>
                            {!isSignUp && (
                                <span className="text-xs text-slate-400 font-medium">
                                    忘記密碼？請聯絡行政辦公室
                                </span>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 系統主畫面元件 ServiceManager
        // ==========================================
        function ServiceManager({ session }) {
            const currentUserEmail = session.user.email;
            const currentUserAccount = extractAccountFromEmail(currentUserEmail);
            const isAdmin = currentUserAccount === ADMIN_ACCOUNT || currentUserEmail === ADMIN_ACCOUNT;

            // --- 判斷是否在開放填寫期間 (3,6,9,12月的 1~20日) ---
            const now = new Date();
            const currentMonth = now.getMonth() + 1;
            const currentDate = now.getDate();
            const isSubmissionOpen = [3, 6, 9, 12].includes(currentMonth) && currentDate >= 1 && currentDate <= 20;

            let deadlineMonth = currentMonth;
            if (![3, 6, 9, 12].includes(currentMonth)) {
                if (currentMonth < 3) deadlineMonth = 12;
                else if (currentMonth < 6) deadlineMonth = 3;
                else if (currentMonth < 9) deadlineMonth = 6;
                else if (currentMonth < 12) deadlineMonth = 9;
            }

            const [quarterOptions, setQuarterOptions] = useState(generateBaseQuarters());
            const initialQuarter = isAdmin ? getCurrentQuarter() : getNextQuarter(getCurrentQuarter());
            const [viewQuarter, setViewQuarter] = useState(initialQuarter); 
            
            const [members, setMembers] = useState([]);
            const [positions, setPositions] = useState([]);
            const [memberPositions, setMemberPositions] = useState([]);
            const [quarterSettings, setQuarterSettings] = useState([]);
            
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [message, setMessage] = useState({ type: '', text: '' });
            const [confirmAction, setConfirmAction] = useState(null);

            const [isDeleteQuarterModalOpen, setIsDeleteQuarterModalOpen] = useState(false);
            const [detectedQuarters, setDetectedQuarters] = useState([]);
            const [quarterToDelete, setQuarterToDelete] = useState('');

            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // --- 自訂連假管理相關狀態 ---
            const [isHolidayManagerOpen, setIsHolidayManagerOpen] = useState(false); 
            const [customHolidays, setCustomHolidays] = useState({});
            const [newHolidayDate, setNewHolidayDate] = useState('');
            const [newHolidayName, setNewHolidayName] = useState('');

            const [editingMember, setEditingMember] = useState(null); 
            const [formData, setFormData] = useState({ ...DEFAULT_MEMBER });
            const [formPositions, setFormPositions] = useState({}); 

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const { data: allSettingsQs } = await supabase.from('member_quarter_settings').select('quarter');
                    
                    const [
                        { data: mData },
                        { data: pData },
                        { data: mpData },
                        { data: qsData },
                        { data: sysSettingsData } 
                    ] = await Promise.all([
                        supabase.from('members').select('*').order('name'),
                        supabase.from('positions').select('*').order('id'),
                        supabase.from('member_positions').select('*').eq('quarter', viewQuarter),
                        supabase.from('member_quarter_settings').select('*').eq('quarter', viewQuarter),
                        supabase.from('member_quarter_settings').select('*').eq('quarter', 'SYSTEM')
                    ]);

                    setMembers(mData || []);
                    setPositions(pData || []);
                    setMemberPositions(mpData || []);
                    setQuarterSettings(qsData || []);

                    let parsedHolidays = {};
                    if (sysSettingsData && sysSettingsData.length > 0) {
                        const datesArr = sysSettingsData[0].unavailable_dates;
                        if (Array.isArray(datesArr)) {
                            datesArr.forEach(item => {
                                const [d, n] = item.split('|');
                                if (d && n) parsedHolidays[d] = n;
                            });
                        }
                    }
                    setCustomHolidays(parsedHolidays);

                    if (allSettingsQs) {
                        const dbQuarters = allSettingsQs.map(d => d.quarter).filter(q => q !== 'SYSTEM');
                        const combinedQs = [...new Set([...generateBaseQuarters(), ...dbQuarters, viewQuarter])].sort();
                        setQuarterOptions(combinedQs);
                    }
                } catch (err) {
                    showMessage('error', '載入資料失敗，請確認連線。');
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { loadData(); }, [viewQuarter]);

            const handleLogout = async () => {
                await supabase.auth.signOut();
            };

            const showMessage = (type, text) => {
                setMessage({ type, text });
                setTimeout(() => setMessage({ type: '', text: '' }), 4000);
            };

            // ---- API Actions (Create Next Quarter, Delete Quarter, etc) ----
            const triggerCreateNextQuarter = () => {
                const targetQ = getNextQuarter(viewQuarter);
                setConfirmAction({
                    title: '建立同工資料',
                    message: `完整複製【${viewQuarter}】同工資料至【${targetQ}】`,
                    confirmText: '複製',
                    onConfirm: () => executeCreateNextQuarter(viewQuarter, targetQ)
                });
            };

            const executeCreateNextQuarter = async (sourceQ, targetQ) => {
                setConfirmAction(null);
                setIsLoading(true);
                try {
                    const { data: oldSettings, error: err1 } = await supabase.from('member_quarter_settings').select('*').eq('quarter', sourceQ);
                    const { data: oldPos, error: err2 } = await supabase.from('member_positions').select('*').eq('quarter', sourceQ);

                    if (err1) throw err1;
                    if (err2) throw err2;

                    if ((!oldSettings || oldSettings.length === 0) && (!oldPos || oldPos.length === 0)) {
                        throw new Error(`【${sourceQ}】目前沒有任何資料可供複製！`);
                    }

                    const uniqueSettingsMap = new Map();
                    if (oldSettings) {
                        oldSettings.forEach(s => uniqueSettingsMap.set(s.member_id, s));
                    }
                    const filteredOldSettings = Array.from(uniqueSettingsMap.values());

                    const uniquePosMap = new Map();
                    if (oldPos) {
                        oldPos.forEach(p => uniquePosMap.set(`${p.member_id}_${p.position_id}`, p));
                    }
                    const filteredOldPos = Array.from(uniquePosMap.values());

                    await supabase.from('member_quarter_settings').delete().eq('quarter', targetQ);
                    await supabase.from('member_positions').delete().eq('quarter', targetQ);
                    
                    if (filteredOldSettings.length > 0) {
                        const newSettings = filteredOldSettings.map(s => ({
                            member_id: s.member_id,
                            preferred_session: s.preferred_session,
                            availability_status: s.availability_status === '安息季' ? '穩定服事' : s.availability_status,
                            dual_service_pref: s.dual_service_pref,
                            newcomer_rule: s.newcomer_rule,
                            unavailable_dates: [], 
                            quarter: targetQ
                        }));
                        const { error: insErr1 } = await supabase.from('member_quarter_settings').upsert(newSettings, { onConflict: 'member_id, quarter' });
                        if (insErr1) throw new Error("寫入設定失敗: " + insErr1.message);
                    }

                    if (filteredOldPos.length > 0) {
                        const newPos = filteredOldPos.map(p => ({
                            member_id: p.member_id,
                            position_id: p.position_id,
                            is_active: p.is_active,
                            quarter: targetQ
                        }));
                        const { error: insErr2 } = await supabase.from('member_positions').upsert(newPos, { onConflict: 'member_id, position_id, quarter' });
                        if (insErr2) throw new Error("寫入資格失敗: " + insErr2.message);
                    }
                    
                    showMessage('success', `已成功建立 ${targetQ} 資料！`);
                    setViewQuarter(targetQ);
                } catch (err) {
                    showMessage('error', '建立失敗: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const openDeleteQuarterModal = async () => {
                setIsLoading(true);
                try {
                    const { data: allSettingsQs } = await supabase.from('member_quarter_settings').select('quarter');
                    const { data: allPosQs } = await supabase.from('member_positions').select('quarter');
                    
                    const combined = [...(allSettingsQs || []), ...(allPosQs || [])].map(d => d.quarter);
                    const uniqueQs = [...new Set(combined)].filter(q => q !== 'SYSTEM').sort().reverse();
                    
                    setDetectedQuarters(uniqueQs);
                    if (uniqueQs.length > 0) {
                        setQuarterToDelete(uniqueQs[0]);
                    } else {
                        setQuarterToDelete('');
                    }
                    setIsDeleteQuarterModalOpen(true);
                } catch (err) {
                    showMessage('error', '無法載入現有季度清單');
                } finally {
                    setIsLoading(false);
                }
            };

            const executeDeleteQuarter = async () => {
                if (!quarterToDelete) return;
                setIsLoading(true);
                try {
                    const { data: delSettings, error: err1 } = await supabase.from('member_quarter_settings').delete().eq('quarter', quarterToDelete).select();
                    const { data: delPos, error: err2 } = await supabase.from('member_positions').delete().eq('quarter', quarterToDelete).select();
                    
                    if (err1) throw err1;
                    if (err2) throw err2;
                    
                    if ((!delSettings || delSettings.length === 0) && (!delPos || delPos.length === 0)) {
                        throw new Error("未能刪除資料！請確認權限。");
                    }
                    
                    showMessage('success', `已徹底刪除 ${quarterToDelete} 的所有資料！`);
                    setIsDeleteQuarterModalOpen(false);
                    
                    if (viewQuarter === quarterToDelete) loadData(); 
                } catch (err) {
                    showMessage('error', '刪除失敗: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const openAddModal = () => {
                setEditingMember(null);
                setFormData({ ...DEFAULT_MEMBER });
                setFormPositions({});
                setIsModalOpen(true);
            };

            const handleAddCustomHoliday = async () => {
                if (!newHolidayDate || !newHolidayName.trim()) return showMessage('error', '選擇日期並填寫節日提醒內容');
                setIsLoading(true);
                try {
                    const updatedHolidays = { ...customHolidays, [newHolidayDate]: newHolidayName.trim() };
                    const holidaysArr = Object.entries(updatedHolidays).map(([d, n]) => `${d}|${n}`);
                    
                    let sysMem = members.find(m => m.name === 'SYSTEM_CUSTOM_HOLIDAYS_DB');
                    if (!sysMem) {
                        const { data, error } = await supabase.from('members').insert({
                            name: 'SYSTEM_CUSTOM_HOLIDAYS_DB',
                            email: 'sys_holiday@tbc.gmail.com'
                        }).select();
                        if (error) throw error;
                        sysMem = data[0];
                    }

                    const { error: upsertErr } = await supabase.from('member_quarter_settings').upsert({
                        member_id: sysMem.id,
                        quarter: 'SYSTEM',
                        unavailable_dates: holidaysArr
                    }, { onConflict: 'member_id, quarter' });
                    
                    if (upsertErr) throw upsertErr;

                    setCustomHolidays(updatedHolidays);
                    setNewHolidayDate('');
                    setNewHolidayName('');
                    loadData(); 
                } catch (error) {
                    showMessage('error', '新增失敗: ' + error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDeleteCustomHoliday = async (dateToDelete) => {
                setIsLoading(true);
                try {
                    const updatedHolidays = { ...customHolidays };
                    delete updatedHolidays[dateToDelete];
                    const holidaysArr = Object.entries(updatedHolidays).map(([d, n]) => `${d}|${n}`);
                    
                    const sysMem = members.find(m => m.name === 'SYSTEM_CUSTOM_HOLIDAYS_DB');
                    if (sysMem) {
                        const { error: upsertErr } = await supabase.from('member_quarter_settings').upsert({
                            member_id: sysMem.id,
                            quarter: 'SYSTEM',
                            unavailable_dates: holidaysArr
                        }, { onConflict: 'member_id, quarter' });
                        if (upsertErr) throw upsertErr;
                    }
                    
                    setCustomHolidays(updatedHolidays);
                    loadData();
                } catch (error) {
                    showMessage('error', '刪除失敗: ' + error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const openEditModal = (member) => {
                const settings = quarterSettings.find(s => s.member_id === member.id) || DEFAULT_MEMBER;
                
                let safeDates = [];
                if (Array.isArray(settings.unavailable_dates)) {
                    safeDates = settings.unavailable_dates;
                } else if (typeof settings.unavailable_dates === 'string') {
                    try { 
                        const parsed = JSON.parse(settings.unavailable_dates); 
                        safeDates = Array.isArray(parsed) ? parsed : [settings.unavailable_dates];
                    } catch(err) { 
                        safeDates = settings.unavailable_dates ? [settings.unavailable_dates] : []; 
                    }
                }

                setEditingMember(member);
                setFormData({ 
                    ...member, 
                    email: member.email || '', 
                    preferred_session: settings.preferred_session,
                    availability_status: settings.availability_status,
                    dual_service_pref: settings.dual_service_pref || 0,
                    unavailable_dates: safeDates,
                    newcomer_rule: settings.newcomer_rule === null ? '' : settings.newcomer_rule
                });
                
                const posMap = {};
                memberPositions
                    .filter(mp => mp.member_id === member.id)
                    .forEach(mp => {
                        posMap[mp.position_id] = mp.is_active !== false ? 'active' : 'inactive';
                    });
                setFormPositions(posMap);
                
                setIsModalOpen(true);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingMember(null);
                setFormData({ ...DEFAULT_MEMBER });
            };

            const togglePosition = (posId) => {
                if (!isAdmin) return showMessage('error', '崗位變更請洽行政辦公室');
                
                setFormPositions(prev => {
                    const currentStatus = prev[posId];
                    if (!currentStatus) return { ...prev, [posId]: 'active' };
                    if (currentStatus === 'active') return { ...prev, [posId]: 'inactive' };
                    const newState = { ...prev };
                    delete newState[posId];
                    return newState;
                });
            };

            const handleSave = async () => {
                if (!formData.name || !formData.name.trim()) return showMessage('error', '姓名不可為空！');
                
                setIsLoading(true);
                try {
                    let memberId = editingMember ? editingMember.id : null;
                    const cleanedGroupId = (formData.group_id || '').trim().toUpperCase();
                    const finalGroupId = cleanedGroupId === '' ? null : cleanedGroupId;
                    const parsedNewcomerRule = formData.newcomer_rule === '' ? null : parseInt(formData.newcomer_rule);

                    const memberPayload = { name: formData.name.trim() };
                    if (isAdmin) {
                        memberPayload.group_id = finalGroupId;
                        memberPayload.email = formData.email ? formData.email.trim() : null;
                    }

                    if (memberId) {
                        await supabase.from('members').update(memberPayload).eq('id', memberId);
                    } else {
                        if (!isAdmin) throw new Error("只有管理員可以新增同工");
                        const { data, error } = await supabase.from('members').insert(memberPayload).select();
                        if (error) throw error;
                        memberId = data[0].id;
                    }

                    await supabase.from('member_quarter_settings').upsert({
                        member_id: memberId,
                        quarter: viewQuarter,
                        preferred_session: formData.preferred_session,
                        availability_status: formData.availability_status,
                        dual_service_pref: parseInt(formData.dual_service_pref),
                        newcomer_rule: parsedNewcomerRule,
                        unavailable_dates: formData.unavailable_dates
                    }, { onConflict: 'member_id, quarter' });

                    if (isAdmin && memberId) {
                        await supabase.from('member_positions').delete().eq('member_id', memberId).eq('quarter', viewQuarter);
                        const posKeys = Object.keys(formPositions);
                        if (posKeys.length > 0) {
                            const insertPosPayload = posKeys.map(pid => ({ 
                                member_id: memberId, 
                                position_id: pid,
                                quarter: viewQuarter,
                                is_active: formPositions[pid] === 'active'
                            }));
                            await supabase.from('member_positions').insert(insertPosPayload);
                        }
                    }

                    showMessage('success', editingMember ? '更新成功！' : '新增成功！');
                    closeModal();
                    loadData();
                } catch (err) {
                    showMessage('error', `儲存失敗：${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDelete = async (id, name) => {
                if (!isAdmin) return;
                setConfirmAction({
                    title: '警告',
                    message: `永久刪除「${name}」無法恢復，確認刪除？`,
                    confirmText: '刪除',
                    onConfirm: async () => {
                        setConfirmAction(null);
                        setIsLoading(true);
                        try {
                            const { data, error } = await supabase.from('members').delete().eq('id', id).select();
                            if (error) throw error;
                            if (!data || data.length === 0) throw new Error("無權限刪除！");
                            
                            showMessage('success', '已刪除同工資料。');
                            loadData();
                        } catch (err) {
                            showMessage('error', '刪除失敗: ' + err.message);
                        } finally {
                            setIsLoading(false);
                        }
                    }
                });
            };

            // ---- Filter & Sort Members ----
            let displayMembers = members.filter(m => {
                if (m.name === 'SYSTEM_CUSTOM_HOLIDAYS_DB') return false;
                if (!isAdmin && m.email !== currentUserAccount && m.email !== currentUserEmail) return false;

                const term = searchTerm.toLowerCase();
                if (m.name.toLowerCase().includes(term)) return true;
                if (m.group_id && m.group_id.toLowerCase().includes(term)) return true;
                const hasMatchingPosition = memberPositions
                    .filter(mp => mp.member_id === m.id)
                    .some(mp => {
                        const p = positions.find(pos => pos.id === mp.position_id);
                        return p && p.name.toLowerCase().includes(term);
                    });
                if (hasMatchingPosition) return true;
                return false;
            });

            displayMembers.sort((a, b) => {
                const groupA = a.group_id || 'ZZZ_NO_GROUP'; 
                const groupB = b.group_id || 'ZZZ_NO_GROUP';
                if (groupA !== groupB) return groupA.localeCompare(groupB);
                
                const setA = quarterSettings.find(s => s.member_id === a.id) || {};
                const setB = quarterSettings.find(s => s.member_id === b.id) || {};
                const isTopA = (setA.newcomer_rule === 1 || setA.newcomer_rule === 3) ? -1 : 1;
                const isTopB = (setB.newcomer_rule === 1 || setB.newcomer_rule === 3) ? -1 : 1;
                if (isTopA !== isTopB) return isTopA - isTopB;
                
                return a.name.localeCompare(b.name);
            });

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-24 sm:pb-8">
                    {/* --- 頂部導覽列 --- */}
                    <nav className="bg-white sticky top-0 z-40 border-b border-slate-200 shadow-sm px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white shadow-sm">
                                <Users size={20} />
                            </div>
                            <h1 className="text-lg font-black text-slate-800">
                                TBC同工資料中心
                            </h1>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            {/* Quarter Selector */}
                            {isAdmin && (
                                <div className="flex items-center bg-slate-50 rounded-lg px-2 py-1.5 border border-slate-200">
                                    <select 
                                        value={viewQuarter} 
                                        onChange={(e) => setViewQuarter(e.target.value)}
                                        className="bg-transparent border-none font-bold text-indigo-600 text-sm outline-none cursor-pointer"
                                    >
                                        {quarterOptions.map(q => <option key={q} value={q}>{q}</option>)}
                                    </select>
                                </div>
                            )}
                            
                            {/* Desktop/Tablet Logout */}
                            <button onClick={handleLogout} className="hidden sm:flex text-slate-500 hover:text-slate-700 bg-slate-100 p-2 rounded-lg transition-colors" title="登出">
                                <LogOut size={18} />
                            </button>
                        </div>
                    </nav>

                    {/* --- 狀態列與工具列 (手機版可橫向滑動) --- */}
                    <div className="bg-white px-4 py-2.5 border-b border-slate-200 flex items-center gap-2 overflow-x-auto no-scrollbar shadow-sm sticky top-[60px] sm:top-[64px] z-30">
                        {!isAdmin && (
                            <div className={`whitespace-nowrap text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1.5 ${isSubmissionOpen ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}>
                                {isSubmissionOpen ? `🟢 ${deadlineMonth}/20日截止更新` : `🔴 已截止更新，僅供閱覽`}
                            </div>
                        )}
                        {!isAdmin && (
                             <button onClick={handleLogout} className="whitespace-nowrap flex items-center gap-1.5 bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1.5 rounded-full hover:bg-slate-200 transition-colors">
                                 <LogOut size={14} /> 登出
                             </button>
                        )}

                        {isAdmin && (
                            <>
                                <button onClick={() => setIsHolidayManagerOpen(true)} className="whitespace-nowrap flex items-center gap-1.5 bg-sky-50 text-sky-600 hover:bg-sky-100 text-xs font-bold px-3 py-1.5 rounded-full transition-colors">
                                    <CalendarX size={14} /> 節日提醒
                                </button>
                                <button onClick={triggerCreateNextQuarter} className="whitespace-nowrap flex items-center gap-1.5 bg-amber-50 text-amber-600 hover:bg-amber-100 text-xs font-bold px-3 py-1.5 rounded-full transition-colors">
                                    <Copy size={14} /> 新增下一季
                                </button>
                                <button onClick={openDeleteQuarterModal} className="whitespace-nowrap flex items-center gap-1.5 bg-red-50 text-red-600 hover:bg-red-100 text-xs font-bold px-3 py-1.5 rounded-full transition-colors">
                                    <Trash2 size={14} /> 刪除季度
                                </button>
                                <button onClick={handleLogout} className="sm:hidden whitespace-nowrap flex items-center gap-1.5 bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1.5 rounded-full hover:bg-slate-200 transition-colors">
                                    <LogOut size={14} /> 登出
                                </button>
                            </>
                        )}
                    </div>

                    {/* --- 懸浮按鈕 FAB (專屬管理員的新增按鈕) --- */}
                    {isAdmin && (
                        <button 
                            onClick={openAddModal} 
                            className="fixed bottom-6 right-6 z-40 bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-full shadow-[0_8px_16px_rgba(79,70,229,0.4)] flex items-center justify-center transition-transform active:scale-90"
                            title="新增同工"
                        >
                            <UserPlus size={24} />
                        </button>
                    )}

                    {/* --- 主內容區塊 --- */}
                    <main className="flex-grow p-4 sm:p-6 w-full max-w-6xl mx-auto">
                        {/* 搜尋列 */}
                        {isAdmin && (
                            <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 mb-6 flex items-center relative sticky top-[110px] sm:top-[120px] z-20">
                                <Search className="absolute left-4 text-slate-400" size={20} />
                                <input 
                                    type="text" 
                                    placeholder="搜尋姓名、群組或崗位..." 
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                    className="w-full pl-10 pr-10 py-2.5 bg-transparent outline-none font-bold text-slate-700 text-sm"
                                />
                                {searchTerm && (
                                    <button onClick={() => setSearchTerm('')} className="absolute right-4 text-slate-400 hover:text-slate-600 transition-colors p-1" title="清除搜尋">
                                        <X size={18} />
                                    </button>
                                )}
                            </div>
                        )}

                        {/* 資料列表 */}
                        {isLoading && members.length === 0 ? (
                            <div className="text-center py-20 text-slate-400 font-bold animate-pulse">載入資料庫中...</div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                                {displayMembers.map(member => {
                                    const settings = quarterSettings.find(s => s.member_id === member.id) || DEFAULT_MEMBER;
                                    const ownedPosList = memberPositions
                                        .filter(mp => mp.member_id === member.id)
                                        .map(mp => {
                                            const p = positions.find(pos => pos.id === mp.position_id);
                                            return p ? { name: p.name, isActive: mp.is_active !== false } : null;
                                        }).filter(Boolean);

                                    return (
                                        <div key={member.id} className="bg-white rounded-2xl p-4 sm:p-6 shadow-sm border border-slate-200 hover:shadow-md transition-shadow relative">
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <h3 className="text-lg sm:text-xl font-black text-slate-800 flex items-center gap-2 flex-wrap leading-tight">
                                                        {member.name}
                                                        {isAdmin && settings.dual_service_pref === 1 && <span className="text-[10px] bg-purple-50 text-purple-600 px-2 py-0.5 rounded border border-purple-100">二堂同崗</span>}
                                                        {isAdmin && settings.dual_service_pref === 2 && <span className="text-[10px] bg-purple-50 text-purple-600 px-2 py-0.5 rounded border border-purple-100">二堂異崗</span>}
                                                        {isAdmin && member.group_id && <span className="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded border border-indigo-100">{member.group_id}</span>}
                                                    </h3>
                                                    <div className="flex items-center flex-wrap gap-1.5 text-xs font-bold mt-2">
                                                        <span className={`px-2 py-0.5 rounded-full ${settings.availability_status === '穩定服事' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'}`}>
                                                            {settings.availability_status}
                                                        </span>
                                                        <span className="text-slate-300">|</span>
                                                        <span className="text-slate-500">{settings.preferred_session}</span>
                                                    </div>
                                                </div>
                                                
                                                {/* 編輯/刪除 操作按鈕 */}
                                                <div className="flex gap-1.5">
                                                    {(isAdmin || isSubmissionOpen) && (
                                                        <button onClick={() => openEditModal(member)} className="p-2.5 bg-slate-50 hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 rounded-xl transition-colors"><Edit2 size={16}/></button>
                                                    )}
                                                    {isAdmin && (
                                                        <button onClick={() => handleDelete(member.id, member.name)} className="p-2.5 bg-slate-50 hover:bg-red-50 text-slate-400 hover:text-red-600 rounded-xl transition-colors"><Trash2 size={16}/></button>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="space-y-2.5">
                                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                    <p className="text-[10px] font-bold text-slate-400 mb-1.5 flex items-center gap-1"><ShieldCheck size={12}/> 服事崗位 ({ownedPosList.length})</p>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {ownedPosList.length > 0 ? ownedPosList.map(p => (
                                                            <span key={p.name} className={`text-xs font-bold px-2 py-1 rounded-lg border flex items-center gap-1 ${p.isActive ? 'bg-white border-slate-200 text-slate-600 shadow-sm' : 'bg-slate-100 border-slate-200 border-dashed text-slate-400'}`}>
                                                                {p.name} 
                                                                {isAdmin && !p.isActive && <span className="text-[10px] bg-slate-200 text-slate-500 px-1 rounded">暫停</span>}
                                                                {isAdmin && (p.name.includes('新朋友') && settings.newcomer_rule > 0) && (
                                                                    <span className="text-[10px] text-indigo-500 ml-0.5">
                                                                        {settings.newcomer_rule === 1 ? "(主責)" : settings.newcomer_rule === 2 ? "(禁排)" : "(主責+禁排)"}
                                                                    </span>
                                                                )}
                                                            </span>
                                                        )) : <span className="text-xs text-slate-400">尚未設定</span>}
                                                    </div>
                                                </div>
                                                
                                                {(settings.unavailable_dates && settings.unavailable_dates.length > 0) && (
                                                    <div className="bg-orange-50/60 p-3 rounded-xl border border-orange-100">
                                                        <p className="text-[10px] font-bold text-orange-400 mb-1.5 flex items-center gap-1"><CalendarX size={12}/> 不可排班日 ({settings.unavailable_dates.length})</p>
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {settings.unavailable_dates.map(d => (
                                                                <span key={d} className="text-[11px] font-bold bg-white text-orange-600 px-2 py-0.5 rounded-md border border-orange-200 shadow-sm">{d.split('-').slice(1).join('/')}</span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        
                        {!isLoading && displayMembers.length === 0 && (
                            <div className="text-center py-20 px-4">
                                <div className="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Users size={24} className="text-slate-400"/></div>
                                <p className="text-slate-500 font-bold mb-2">
                                    {!isAdmin ? '尚未完成帳號設定，請洽詢行政辦公室' : '找不到符合的同工資料'}
                                </p>
                            </div>
                        )}
                    </main>

                    {/* ===================================== */}
                    {/* ★★★ 全新設計：編輯/新增 Modal (手機版全螢幕) ★★★ */}
                    {/* ===================================== */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end sm:justify-center sm:p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full h-[95vh] sm:h-auto sm:max-h-[90vh] sm:max-w-2xl rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-slide-up sm:animate-fade-in">
                                
                                {/* Header - Sticky */}
                                <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-white shrink-0 sticky top-0 z-10">
                                    <h2 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                        {editingMember ? <Edit2 size={20} className="text-indigo-600"/> : <UserPlus size={20} className="text-indigo-600"/>}
                                        {editingMember ? '編輯同工資料' : '新增同工'}
                                    </h2>
                                    <button onClick={closeModal} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 transition-colors"><X size={20}/></button>
                                </div>
                                
                                {/* Body - Scrollable */}
                                <div className="flex-1 overflow-y-auto p-5 space-y-6 pb-8">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-slate-500 uppercase">姓名 <span className="text-red-500">*</span></label>
                                            <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 sm:py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-semibold text-slate-700" placeholder="請輸入姓名" />
                                        </div>
                                        
                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-slate-500 uppercase">服事意願</label>
                                            <select value={formData.availability_status} onChange={e => setFormData({...formData, availability_status: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 sm:py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-semibold text-slate-700">
                                                {STATUS_OPTIONS.filter(opt => isAdmin || (opt !== '安息季' && opt !== '一季一次')).map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                            </select>
                                        </div>

                                        <div className="space-y-1.5">
                                            <label className="text-xs font-bold text-slate-500 uppercase">堂別</label>
                                            <select value={formData.preferred_session} onChange={e => setFormData({...formData, preferred_session: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 sm:py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-semibold text-slate-700">
                                                {SESSION_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                            </select>
                                        </div>

                                        {isAdmin && (
                                            <>
                                                <div className="space-y-1.5">
                                                    <label className="text-xs font-bold text-slate-500 uppercase">群組 ID <span className="text-slate-400 font-normal">(選填)</span></label>
                                                    <input type="text" value={formData.group_id} onChange={e => setFormData({...formData, group_id: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 sm:py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-semibold text-slate-700 uppercase" placeholder="例如：FA" />
                                                </div>

                                                <div className="space-y-1.5">
                                                    <label className="text-xs font-bold text-slate-500 uppercase">同日二堂服事 <span className="text-slate-400 font-normal">(選填)</span></label>
                                                    <select value={formData.dual_service_pref} onChange={e => setFormData({...formData, dual_service_pref: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 sm:py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-semibold text-slate-700">
                                                        <option value="0">無</option><option value="1">二堂同崗</option><option value="2">二堂異崗</option>
                                                    </select>
                                                </div>

                                                <div className="space-y-1.5">
                                                    <label className="text-xs font-bold text-slate-500 uppercase">新朋友關懷設定 <span className="text-slate-400 font-normal">(選填)</span></label>
                                                    <select value={formData.newcomer_rule === null ? '' : formData.newcomer_rule} onChange={e => setFormData({...formData, newcomer_rule: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 sm:py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-semibold text-slate-700">
                                                        <option value="">預設(正常排班)</option><option value="1">主責</option><option value="2">禁排第二週</option><option value="3">主責 ＋ 禁排第二週</option>
                                                    </select>
                                                </div>
                                            </>
                                        )}
                                    </div>

                                    {isAdmin && (
                                        <div className="space-y-2 bg-indigo-50/50 p-4 rounded-xl border border-indigo-100">
                                            <label className="text-xs font-bold text-indigo-600 flex items-center gap-1.5 flex-wrap"><User size={14}/> 帳號 <span className="text-[10px] text-indigo-400 font-normal">(忘記密碼需變更帳號，再重新綁定)</span></label>
                                            <input type="text" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full bg-white border border-indigo-200 rounded-xl px-4 py-3 sm:py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-semibold text-slate-700" placeholder="電話號碼或電子郵件" />
                                        </div>
                                    )}

                                    {/* 觸控友善的服事崗位 Chips */}
                                    <div className="pt-2 border-t border-slate-100">
                                        <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5 mb-3">
                                            <ShieldCheck size={18} className="text-indigo-500"/> 服事崗位 
                                            {!isAdmin && <span className="text-[10px] text-slate-400 font-normal ml-1">(僅供檢視)</span>}
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {positions.map(pos => {
                                                const status = formPositions[pos.id];
                                                if (!isAdmin && !status) return null;

                                                const isBtnActive = status === 'active';
                                                const isBtnInactive = status === 'inactive';
                                                
                                                return (
                                                    <button
                                                        key={pos.id} type="button" onClick={() => togglePosition(pos.id)}
                                                        className={`px-4 py-2.5 sm:py-2 rounded-xl text-sm font-bold border-2 transition-all flex items-center gap-1.5 ${!isAdmin ? 'cursor-default' : 'active:scale-95'} ${isBtnActive ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : isBtnInactive ? 'bg-white border-slate-300 text-slate-500 border-dashed' : 'bg-slate-50 border-slate-100 text-slate-400'}`}
                                                    >
                                                        {pos.name}
                                                        {isAdmin && isBtnActive && <span className="w-2 h-2 rounded-full bg-indigo-500 ml-1"></span>}
                                                        {isAdmin && isBtnInactive && <span className="text-[10px] ml-1 opacity-60">暫停</span>}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* 觸控友善的不可排班日卡片 */}
                                    <div className="pt-4 border-t border-slate-100">
                                        <label className="text-sm font-bold text-slate-700 flex items-center gap-1.5 mb-3">
                                            <CalendarX size={18} className="text-orange-500"/> 不可排班日 
                                            <span className="text-xs text-slate-400 font-normal ml-1">(點擊選取)</span>
                                        </label>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-2.5">
                                            {getSundaysInQuarter(viewQuarter).map(date => {
                                                const isChecked = Array.isArray(formData.unavailable_dates) && formData.unavailable_dates.includes(date);
                                                const holidayName = getHolidayName(date, customHolidays);
                                                const shortDate = date.split('-').slice(1).join('/'); // MM/DD
                                                return (
                                                    <label key={date} className={`relative flex flex-col items-center justify-center p-3 sm:p-2 rounded-2xl border-2 transition-all cursor-pointer select-none active:scale-[0.97] ${isChecked ? 'bg-orange-50 border-orange-500 shadow-md' : 'bg-white border-slate-200 hover:border-orange-200'}`}>
                                                        <input 
                                                            type="checkbox" className="sr-only" checked={isChecked}
                                                            onChange={(e) => {
                                                                let newDates = Array.isArray(formData.unavailable_dates) ? [...formData.unavailable_dates] : [];
                                                                if (e.target.checked) {
                                                                    if (!newDates.includes(date)) newDates.push(date);
                                                                } else {
                                                                    newDates = newDates.filter(d => d !== date);
                                                                }
                                                                setFormData({ ...formData, unavailable_dates: newDates.sort() });
                                                            }}
                                                        />
                                                        {isChecked && <Check className="absolute top-1 right-1 text-orange-500" size={14} strokeWidth={3} />}
                                                        <span className={`text-base sm:text-sm font-black ${isChecked ? 'text-orange-600' : 'text-slate-600'}`}>{shortDate}</span>
                                                        {holidayName && <span className={`text-[10px] font-bold mt-1 text-center leading-tight ${isChecked ? 'text-orange-500' : 'text-slate-400'}`}>{holidayName}</span>}
                                                    </label>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Footer - Sticky */}
                                <div className="px-5 py-4 border-t border-slate-100 bg-white flex gap-3 shrink-0 pb-8 sm:pb-4 sticky bottom-0 z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                                    <button onClick={closeModal} className="flex-1 py-3.5 sm:py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">取消</button>
                                    <button onClick={handleSave} disabled={isLoading} className="flex-[2] py-3.5 sm:py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-md transition-all active:scale-95 disabled:opacity-50">
                                        <Save size={18}/> {isLoading ? '儲存中...' : '儲存設定'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂節日管理 Modal (同樣適用全螢幕手機設計) */}
                    {isHolidayManagerOpen && isAdmin && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end sm:justify-center sm:p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full h-[90vh] sm:h-auto sm:max-h-[90vh] sm:max-w-lg rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-slide-up sm:animate-fade-in">
                                <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-white shrink-0 sticky top-0">
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                        <CalendarX className="text-sky-500" size={20} /> 自訂節日提醒
                                    </h3>
                                    <button onClick={() => setIsHolidayManagerOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-500"><X size={20}/></button>
                                </div>

                                <div className="p-5 overflow-y-auto space-y-6 flex-1">
                                    <div className="bg-sky-50 p-4 rounded-2xl border border-sky-100 text-sm font-bold text-sky-700 leading-relaxed">
                                        系統內建至 2030 年的節日。手動新增在此的節日，排班時會自動標示出來！
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-xs font-bold text-slate-500 uppercase">新增節日提醒</label>
                                        <div className="flex flex-col gap-2 sm:flex-row">
                                            <input type="date" value={newHolidayDate} onChange={e => {
                                                const val = e.target.value;
                                                if (val && new Date(val).getDay() !== 0) { showMessage('error', '只能選週日'); setNewHolidayDate(''); return; }
                                                setNewHolidayDate(val);
                                            }} className="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-sky-500 focus:ring-2 w-full sm:w-auto font-bold text-slate-700" />
                                            <input type="text" placeholder="輸入節日提醒" value={newHolidayName} onChange={e => setNewHolidayName(e.target.value)} className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-sky-500 focus:ring-2 font-bold text-slate-700 w-full" />
                                            <button onClick={handleAddCustomHoliday} disabled={isLoading} className="bg-sky-500 hover:bg-sky-600 text-white font-bold px-4 py-3 rounded-xl active:scale-95 w-full sm:w-auto">新增</button>
                                        </div>
                                    </div>

                                    <div className="space-y-3 pb-8">
                                        <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-2">已建立的提醒清單 <span className="bg-slate-200 text-slate-500 px-2 rounded-full text-[10px]">{Object.keys(customHolidays).length}</span></label>
                                        {Object.keys(customHolidays).length === 0 ? (
                                            <div className="text-center py-8 text-slate-400 font-bold bg-slate-50 rounded-2xl border border-dashed border-slate-200">尚無自訂提醒</div>
                                        ) : (
                                            <div className="space-y-2 max-h-[40vh] overflow-y-auto pr-1">
                                                {Object.entries(customHolidays).sort(([a], [b]) => a.localeCompare(b)).map(([date, name]) => (
                                                    <div key={date} className="flex justify-between items-center bg-white border border-slate-200 p-3 rounded-xl shadow-sm">
                                                        <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3">
                                                            <span className="text-sky-600 font-black text-sm">{date}</span>
                                                            <span className="font-bold text-slate-700 text-sm">{name}</span>
                                                        </div>
                                                        <button onClick={() => handleDeleteCustomHoliday(date)} className="p-3 bg-red-50 text-red-500 rounded-lg active:scale-95"><Trash2 size={18}/></button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 全局通知 & 警告對話框 (優化手機換行顯示) */}
                    {message.text && (
                        <div className={`fixed top-24 left-1/2 -translate-x-1/2 z-[80] px-5 py-3 rounded-2xl font-bold shadow-xl animate-fade-in flex items-start gap-2 max-w-[90vw] w-max ${message.type === 'success' ? 'bg-slate-800 text-emerald-400' : 'bg-red-600 text-white'}`}>
                            <div className="shrink-0 mt-0.5">{message.type === 'success' ? <CheckCircle2 size={18}/> : <AlertCircle size={18}/>}</div>
                            <div className="text-sm leading-snug break-words flex-1">{message.text}</div>
                        </div>
                    )}

                    {(confirmAction || isDeleteQuarterModalOpen) && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl flex flex-col overflow-hidden animate-fade-in">
                                <div className="p-8 text-center">
                                    <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5 ${confirmAction?.title === '警告' || isDeleteQuarterModalOpen ? 'bg-red-100 text-red-500' : 'bg-amber-100 text-amber-500'}`}>
                                        {isDeleteQuarterModalOpen ? <Trash2 size={32}/> : <AlertCircle size={32}/>}
                                    </div>
                                    <h3 className="text-xl font-black text-slate-800 mb-3">{isDeleteQuarterModalOpen ? '刪除同工資料' : confirmAction?.title}</h3>
                                    
                                    {isDeleteQuarterModalOpen ? (
                                        <>
                                            <p className="text-sm font-bold text-slate-500 mb-4">永久刪除，<span className="text-red-500">無法復原！</span></p>
                                            <select value={quarterToDelete} onChange={(e) => setQuarterToDelete(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-slate-700 text-center text-lg">
                                                {detectedQuarters.map(q => <option key={q} value={q}>{q}</option>)}
                                            </select>
                                        </>
                                    ) : (
                                        <p className="text-sm font-bold text-slate-500 whitespace-pre-line">{confirmAction?.message}</p>
                                    )}
                                </div>
                                <div className="p-3 bg-slate-50 flex gap-2 border-t border-slate-100">
                                    <button onClick={() => {setConfirmAction(null); setIsDeleteQuarterModalOpen(false);}} className="flex-1 py-3.5 font-black text-slate-600 bg-slate-200 rounded-xl">取消</button>
                                    <button onClick={isDeleteQuarterModalOpen ? executeDeleteQuarter : confirmAction?.onConfirm} className={`flex-1 py-3.5 font-black text-white rounded-xl ${isDeleteQuarterModalOpen || confirmAction?.title === '警告' ? 'bg-red-500' : 'bg-amber-500'}`}>
                                        {isDeleteQuarterModalOpen ? '刪除' : (confirmAction?.confirmText || '確定')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [session, setSession] = useState(null);
            const [isSessionLoaded, setIsSessionLoaded] = useState(false);
            
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    setIsSessionLoaded(true);
                });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    setIsSessionLoaded(true);
                });
                return () => subscription.unsubscribe();
            }, []);

            if (!isSessionLoaded) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><div className="text-slate-400 font-bold animate-pulse">載入中...</div></div>;
            if (!session) return <AuthScreen supabase={supabase} />;
            return <ServiceManager session={session} />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
